title: Dashdown Docs

branding:
  logo: assets/dashdown-icon.svg

# These docs are themselves a Dashdown project — every page you read is a
# `pages/*.md` file rendered by the same pipeline it documents. The charts below
# are live queries against `data/downloads.csv` (see sources.yaml).

format:
  locale: en-US

# Powers the live <Ask /> example on the AI page. With MISTRAL_API_KEY unset
# the site still serves and builds — the ask card just shows a "commentary is
# not available" note instead of failing.
llm:
  provider: mistral
  api_key: ${MISTRAL_API_KEY}
  model: mistral-medium-latest

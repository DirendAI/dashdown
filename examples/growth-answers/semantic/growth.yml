# The growth semantic model — one boring-semantic-layer (BSL) model over the
# orders/campaigns join, so charts and <Ask>/<Value> can reference a metric +
# dimension directly instead of hand-writing SQL for every cut.
#
# `connector:` bridges this model's `table` to the `growth` source in
# sources.yaml (the CSV-backed DuckDB) so there's one connection config and
# real pushdown — see tests/fixtures/semantic_first_class/semantic/sales.yml
# for the pattern this follows.
#
# Needs the optional deps:  pip install 'dashdown-md[semantic]'

orders:
  connector: growth
  table: orders
  description: Customer orders, one row per purchase

  dimensions:
    campaign_id: _.campaign_id
    # Row-level amount doubles as a dimension so *list* questions can show and
    # order by it ("the largest orders") — a list rung only speaks dimensions.
    # Numeric dimensions are legitimate order-grain attributes.
    amount: _.amount
    order_date:
      expr: _.order_date
      is_time_dimension: true
      smallest_time_grain: TIME_GRAIN_DAY

  measures:
    revenue:
      expr: _.amount.sum()
      metadata: { format: currency, currency: "$" }
    orders: _.count()
    avg_order_value:
      expr: _.amount.mean()
      metadata: { format: currency, currency: "$" }
    # The superlative as an aggregate: "what was the largest order last week"
    # answers directly as a semantic metric (with the date filter).
    largest_order:
      expr: _.amount.max()
      metadata: { format: currency, currency: "$" }

  # Joins to campaigns (campaign name/channel) and customers (city) so a chart
  # can group orders by a column that lives in a different table.
  joins:
    campaign:
      model: campaign
      type: one
      left_on: campaign_id
      right_on: campaign_id
    customer:
      model: customer
      type: one
      left_on: customer_id
      right_on: customer_id

campaign:
  connector: growth
  table: campaigns
  dimensions:
    campaign_id: _.campaign_id
    name: _.name
    channel: _.channel
  measures:
    n: _.count()

customer:
  connector: growth
  table: customers
  dimensions:
    customer_id: _.customer_id
    city: _.city
  measures:
    n: _.count()
